<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Multiserv Stock – Inicio</title>

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <!-- Header dinámico -->
  <div id="header-container"></div>

  <main class="main-container">

    <h2>Bienvenido al sistema</h2>
    <p>Panel general de control del sistema.</p>

    <!-- =========================
         DASHBOARD CARDS
    ========================== -->
    <div class="dashboard-cards">

      <div class="card">
        <h3>Total de productos</h3>
        <p id="total-productos">0</p>
      </div>

      <div class="card">
        <h3>Productos con bajo stock</h3>
        <p id="bajo-stock">0</p>
      </div>

      <div class="card">
        <h3>Stock total general</h3>
        <p id="stock-general">0</p>
      </div>

      <div class="card">
        <h3>Total de proveedores</h3>
        <p id="total-proveedores">0</p>
      </div>

    </div>

    <!-- =========================
         LISTA DE ALERTAS
    ========================== -->
    <div class="dashboard-alertas">
      <h3>Productos en alerta</h3>
      <ul id="lista-alertas">
        <!-- Se carga por JS -->
      </ul>
    </div>

  </main>

  <!-- Configuración API -->
<script src="js/config.js"></script>

<!-- Cliente API -->
<script src="js/api.js"></script>

<!-- Header dinámico -->
<script src="components/headerLoader.js"></script>

  <!-- =========================
       SCRIPT PRINCIPAL
  ========================== -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {

 apiFetch("session.php")
       .then(data => {

        if (!data.logueado) {
          window.location.href = "login.html";
          return;
        }

        cargarHeader("inicio");
        cargarDashboard();

      })
      .catch(() => {
        window.location.href = "login.html";
      });

  });


  function cargarDashboard() {

  apiFetch("dashboard.php")
    .then(data => {

      if (!data) return;

      document.getElementById("total-productos").textContent = data.total_productos;
      document.getElementById("bajo-stock").textContent = data.bajo_stock;
      document.getElementById("stock-general").textContent = data.stock_general;
      document.getElementById("total-proveedores").textContent = data.total_proveedores;
        // Cambiar color si hay bajo stock
        const cardBajoStock = document.getElementById("bajo-stock").closest(".card");

        if (data.bajo_stock > 0) {
          cardBajoStock.classList.add("alert");
        } else {
          cardBajoStock.classList.remove("alert");
        }

        // =========================
        // RENDER ALERTAS
        // =========================

        const lista = document.getElementById("lista-alertas");
        lista.innerHTML = "";

        if (!data.productos_alerta || data.productos_alerta.length === 0) {
          lista.innerHTML = "<li>No hay productos en alerta.</li>";
          return;
        }

        data.productos_alerta.forEach(p => {
          const li = document.createElement("li");
          li.innerHTML = `
            <span class="alert-nombre">${p.descripcion}</span>
            <span class="alert-stock">
              Stock: ${p.stock_actual} | Mínimo: ${p.stock_minimo}
            </span>
          `;
          if (p.stock_actual === 0) {
            li.classList.add("alert-critico");
          } else if (p.stock_actual < p.stock_minimo) {
            li.classList.add("alert-bajo");
          } else {
            li.classList.add("alert-minimo");
          }
          lista.appendChild(li);
        });

      })
      .catch(error => {
        console.error("Error al cargar dashboard:", error);
      });
  }
  </script>

</body>
</html>
