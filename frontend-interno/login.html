<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Multiserv Stock</title>
<link rel="stylesheet" href="css/main.css">
</head>

<body>

<div class="login-wrapper">
<div class="login-card">

<h2 class="login-title">Multiserv Stock</h2>
<p class="login-subtitle">Iniciar sesión</p>

<form id="formLogin">

<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label for="password">Contraseña</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="btn btn-primary login-btn-full">
Ingresar
</button>

</form>

<div id="mensaje"></div>

</div>
</div>

<script>

document.getElementById("formLogin").addEventListener("submit", function(e) {

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

fetch("/api-stock/login.php", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ email, password })
})

.then(res => res.json())

.then(data => {

const mensaje = document.getElementById("mensaje");
mensaje.className = "";

if (data.success) {

mensaje.classList.add("message","message-success");
mensaje.innerText = "Ingreso correcto. Redirigiendo...";

setTimeout(() => {
  window.location.href = "index.html";
},800);

} else {

mensaje.classList.add("message","message-error");
mensaje.innerText = data.error;

}

})

.catch(() => {

const mensaje = document.getElementById("mensaje");
mensaje.className = "message message-error";
mensaje.innerText = "Error de conexión";

});

});

</script>

</body>
</html>
