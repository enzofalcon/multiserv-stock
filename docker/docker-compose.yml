version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: multiserv-web
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_NAME: multiserv
      DB_USER: multiserv_user
      DB_PASS: multiserv_pass

  mysql:
    image: mysql:8.0
    container_name: multiserv-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: multiserv
      MYSQL_USER: multiserv_user
      MYSQL_PASSWORD: multiserv_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d

volumes:
  mysql_data: